# Route the built-in OpenAI provider to OpenRouter to bypass
# the ChatGPT account model restrictions. This works because
# OpenRouter supports the OpenAI-compatible Responses API via
# HTTP streaming (SSE).
#
# Note: The built-in OpenAI provider also attempts a WebSocket
# connection (wss://openrouter.ai/api/v1/responses) which
# OpenRouter returns 404 for. This is harmless — Codex logs the
# error and falls back to HTTP SSE streaming.
openai_base_url = "https://openrouter.ai/api/v1"

# Default model
model = "qwen/qwen3.6-plus"

[projects."/Users/YOUR_USERNAME/.config/opencode"]
trust_level = "trusted"

[plugins."canva@openai-curated"]
enabled = true

[plugins."hugging-face@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true
