# Route OpenAI provider through OpenRouter via openai_base_url
#
# Note: WebSocket 404 errors on startup are harmless. Codex tries
# wss://openrouter.ai/api/v1/responses which OpenRouter doesn't support,
# then falls back to HTTP SSE streaming. Everything still works.

openai_base_url = "https://openrouter.ai/api/v1"

# Default model
model = "qwen/qwen3.6-plus"

[projects."/Users/YOUR_USERNAME/.config/opencode"]
trust_level = "trusted"

[projects."/Users/YOUR_USERNAME/dotfiles"]
trust_level = "trusted"

[plugins."canva@openai-curated"]
enabled = true

[plugins."hugging-face@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true
